name: Terraform aft plan
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "terragrunt/org_account/aft/**"
      - ".github/workflows/tf-plan-aft.yml"
      - ".github/workflows/tf-apply.yml"
env:
  AWS_REGION: "ca-central-1"
  TERRAFORM_VERSION: 1.7.2
  TERRAGRUNT_VERSION: 0.55.1
  CONFTEST_VERSION: 0.49.0

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: write
  checks: write
  statuses: write

jobs:
  terraform-plan-aft-account:

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: setup terraform tools
        uses: cds-snc/terraform-tools-setup@36df0d7572a15921998170395475093c183d720a # v1.3.0

      - name: Configure aws credentials using OIDC
        uses: aws-actions/configure-aws-credentials@ffc08eae7350b1061d7de219e2135c75561fb680 # master
        with:
          role-to-assume: arn:aws:iam::659087519042:role/CDSLZTerraformAdminPlanRole
          role-session-name: 659087519042-aft-CDSLZTerraformAdminPlanRole-plan
          aws-region: ca-central-1

      - name: Terraform Plan for org_account/aft
        # I have no idea if this will work.
        uses: cds-snc/terraform-plan@39b0058bcf977fbd8b067b84d5a9f6165e356c32 # v3.7.0
        with:
          comment-delete: true
          comment-title: Plan for org_account/aft
          directory: ./terragrunt/org_account/aft
          github-token: ${{ secrets.GITHUB_TOKEN }}
          terragrunt: true